<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>naughty · TOP page final design</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Shippori+Mincho+B1:wght@400;500;600;700;800&display=swap" />

  <link rel="stylesheet" href="design/naughty.css" />

  <style>
    html, body { margin: 0; padding: 0; background: #f0eee9; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="design/copy.v2.jsx"></script>
  <script type="text/babel" src="design/sections-top.jsx"></script>
  <script type="text/babel" src="design/sections-mid.jsx"></script>
  <script type="text/babel" src="design/sections-bot.jsx"></script>
  <script type="text/babel" src="design/decor.jsx"></script>
  <script type="text/babel" src="design/scroll-accents.jsx"></script>
  <script type="text/babel" src="design/loading.jsx"></script>
  <script type="text/babel" src="design/page.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "tone": "friendly",
      "fvStyle": "webcam-glitch",
      "showLoader": true,
      "loaderKey": 0
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <>
          <DesignCanvas
            title="naughty · TOP page / Final"
            subtitle={
              "A案(縦スクロール・編集型)の骨組み × B案(白黒+ピンク差し色)の世界観。" +
              "デスクトップとモバイルを横並びで。Tweaks でコピートーンとFV演出を切り替え可。"
            }
          >
            <DCSection
              id="final"
              title="Final design — Desktop / Mobile"
              subtitle="どちらも実装可能なHTML/CSSで構築。スクロールで全セクションを確認できます。"
            >
              <DCArtboard id="desktop" label="Desktop · 1440 × full" width={1440} height={7200}>
                <Page variant="desktop" tweaks={t} />
              </DCArtboard>

              <DCArtboard id="mobile" label="Mobile · 390 × full" width={390} height={7800}>
                <Page variant="mobile" tweaks={t} />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection label="コピーのトーン">
              <TweakRadio
                label="Tone"
                value={t.tone}
                onChange={v => setTweak("tone", v)}
                options={[
                  { value: "sharp",    label: "尖らせる" },
                  { value: "friendly", label: "親しみ" }
                ]}
              />
              <div style={{ fontSize: 11, color: "rgba(60,50,40,.6)", marginTop: 6, lineHeight: 1.5 }}>
                FV / コンセプト / CTA / お知らせの文言が切り替わります。
              </div>
            </TweakSection>

            <TweakSection label="FV の演出">
              <TweakRadio
                label="FV style"
                value={t.fvStyle}
                onChange={v => setTweak("fvStyle", v)}
                options={[
                  { value: "webcam-glitch", label: "Webcam" },
                  { value: "curtain",       label: "Curtain" }
                ]}
              />
              <div style={{ fontSize: 11, color: "rgba(60,50,40,.6)", marginTop: 6, lineHeight: 1.5 }}>
                Webcam:常時、グリッチ風カメラパネルを表示。<br/>
                Curtain:読み込み時に黒幕が落ちる演出を重ねる。
              </div>
            </TweakSection>

            <TweakSection label="ローディング画面">
              <TweakToggle
                label="Loading screen"
                value={t.showLoader}
                onChange={v => setTweak("showLoader", v)}
              />
              <TweakButton
                label="Replay loading"
                onClick={() => setTweak("loaderKey", (t.loaderKey || 0) + 1)}
              />
              <div style={{ fontSize: 11, color: "rgba(60,50,40,.6)", marginTop: 6, lineHeight: 1.5 }}>
                ページを開いた瞬間に再生される 000→100 のカウントダウン。<br/>
                完了後にパネルが上下に開いてサイト本体が現れます。
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
